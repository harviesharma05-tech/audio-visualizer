<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8" />
<title>Audio Visualizer</title>
<style>
body{margin:0;background:#0a0e27;overflow:hidden;height:100vh;font-family:Arial;}
canvas{display:block;width:100%;height:100%;}
.controls{position:absolute;top:20px;left:20px;background:#1a1f3a;padding:20px;border:2px solid #00ff9d;border-radius:10px;z-index:10;}
h2{color:#00ff9d;margin:0 0 15px;font-size:18px;}
button{background:#00ff9d;color:#0a0e27;border:none;padding:12px;border-radius:6px;cursor:pointer;width:100%;margin:8px 0;font-weight:bold;font-size:14px;}
button:hover{background:#00ccff;}
</style>
</head>
<body>

<canvas id="canvas"></canvas>

<div class="controls">
  <h2>🎵 Visualizer</h2>
  <button onclick="playMusic()">▶ PLAY</button>
  <button onclick="stopMusic()">⏹ STOP</button>
</div>

<script>
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let isRunning = false;
let bars = Array(128).fill(0);

window.addEventListener('resize', () => {
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
});

function playMusic() {
  isRunning = true;
  draw();
}

function stopMusic() {
  isRunning = false;
  ctx.fillStyle = '#0a0e27';
  ctx.fillRect(0, 0, canvas.width, canvas.height);
}

function draw() {
  // Background
  ctx.fillStyle = 'rgba(10, 14, 39, 0.2)';
  ctx.fillRect(0, 0, canvas.width, canvas.height);
  
  // Update bars with random data
  for (let i = 0; i < bars.length; i++) {
    bars[i] += (Math.random() - 0.5) * 50;
    bars[i] = Math.max(0, Math.min(255, bars[i]));
  }
  
  // Draw bars
  const barWidth = canvas.width / bars.length;
  ctx.fillStyle = '#00ff9d';
  
  for (let i = 0; i < bars.length; i++) {
    const height = (bars[i] / 255) * canvas.height;
    ctx.fillRect(i * barWidth, canvas.height - height, barWidth - 2, height);
  }
  
  if (isRunning) {
    requestAnimationFrame(draw);
  }
}

// Initial screen
ctx.fillStyle = '#a0aec0';
ctx.font = '18px Arial';
ctx.textAlign = 'center';
ctx.fillText('Click PLAY button', canvas.width / 2, canvas.height / 2);
</script>
</body>
</html>
