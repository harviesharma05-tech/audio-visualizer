<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Audio Visualizer</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #0a0e27; overflow: hidden; font-family: Arial; }
canvas { display: block; width: 100%; height: 100%; }
.controls { 
  position: absolute; top: 20px; left: 20px; 
  background: #1a1f3a; border: 2px solid #00ff9d; 
  padding: 20px; border-radius: 10px; z-index: 10; 
}
h2 { color: #00ff9d; margin: 0 0 15px; }
button { 
  background: #00ff9d; color: #0a0e27; 
  border: none; padding: 12px; width: 100%; 
  border-radius: 6px; cursor: pointer; 
  font-weight: bold; margin: 5px 0; 
}
button:hover { opacity: 0.8; }
</style>
</head>
<body>

<canvas id="canvas"></canvas>

<div class="controls">
  <h2>🎵 Visualizer</h2>
  <button onclick="togglePlay()">▶ PLAY</button>
  <button onclick="togglePlay()">⏸ STOP</button>
</div>

<script>
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let playing = false;
let bars = [];

for (let i = 0; i < 64; i++) {
  bars.push(Math.random() * 100);
}

function togglePlay() {
  playing = !playing;
  if (playing) animate();
}

function animate() {
  // Clear with fade
  ctx.fillStyle = 'rgba(10, 14, 39, 0.3)';
  ctx.fillRect(0, 0, canvas.width, canvas.height);
  
  // Update bars
  for (let i = 0; i < bars.length; i++) {
    bars[i] += (Math.random() - 0.5) * 40;
    if (bars[i] < 0) bars[i] = 0;
    if (bars[i] > 200) bars[i] = 200;
  }
  
  // Draw bars
  const barWidth = canvas.width / bars.length;
  for (let i = 0; i < bars.length; i++) {
    const h = (bars[i] / 200) * canvas.height;
    ctx.fillStyle = '#00ff9d';
    ctx.fillRect(i * barWidth, canvas.height - h, barWidth - 1, h);
  }
  
  if (playing) {
    requestAnimationFrame(animate);
  }
}

// Initial message
ctx.fillStyle = '#a0aec0';
ctx.font = '18px Arial';
ctx.textAlign = 'center';
ctx.fillText('Click PLAY', canvas.width / 2, canvas.height / 2);
</script>

</body>
</html>
